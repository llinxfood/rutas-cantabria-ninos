<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: "Inter", sans-serif;
    color: #1f3d2e;
    background: radial-gradient(120% 90% at 25% -10%, #fbf8ef 0%, #f5f0e4 60%);
    position: relative;
    display: flex;
    align-items: center;
  }
  .mountains {
    position: absolute; left: 0; right: 0; bottom: 0; height: 220px; z-index: 0;
  }
  .content {
    position: relative; z-index: 2;
    padding: 0 0 0 80px;
    width: 660px;
  }
  .eyebrow {
    font-size: 22px; letter-spacing: .28em; text-transform: uppercase;
    color: #c46a3f; font-weight: 600; margin-bottom: 22px;
  }
  h1 {
    font-family: "Fraunces", serif; font-weight: 600;
    font-size: 76px; line-height: 1.02; color: #142c20;
    letter-spacing: -.5px; margin-bottom: 26px;
  }
  h1 .accent { color: #c46a3f; font-style: italic; }
  .sub { font-size: 27px; line-height: 1.45; color: #1f3d2e; opacity: .85; margin-bottom: 34px; max-width: 30ch; }
  .badges { display: flex; gap: 14px; flex-wrap: wrap; }
  .badge {
    background: rgba(31,61,46,.05); border: 1.5px solid rgba(31,61,46,.18);
    border-radius: 999px; padding: 12px 24px; font-size: 23px; font-weight: 600;
  }
  .url {
    position: absolute; z-index: 2; left: 80px; bottom: 44px;
    font-size: 22px; color: #5f7d68; font-weight: 600; letter-spacing: .02em;
  }

  /* Rueda decorativa */
  .wheel-area {
    position: absolute; right: 70px; top: 50%; transform: translateY(-50%); z-index: 2;
    width: 380px; height: 380px;
  }
  .wheel {
    width: 380px; height: 380px; border-radius: 50%;
    background: conic-gradient(
      #88a890 0 30deg, #d3a07c 30deg 60deg, #a7bda9 60deg 90deg,
      #cdab78 90deg 120deg, #7e9b85 120deg 150deg, #dbb48d 150deg 180deg,
      #88a890 180deg 210deg, #d3a07c 210deg 240deg, #a7bda9 240deg 270deg,
      #cdab78 270deg 300deg, #7e9b85 300deg 330deg, #dbb48d 330deg 360deg);
    box-shadow: 0 0 0 10px rgba(31,61,46,.06), 0 0 0 20px rgba(31,61,46,.12), 0 30px 70px rgba(20,44,32,.22);
    position: relative;
  }
  .hub {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 120px; height: 120px; border-radius: 50%;
    border: 6px solid #f3eede;
    background: radial-gradient(circle at 35% 30%, #f3cd7e, #e7b85f);
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
  }
  .pointer {
    position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 26px solid transparent; border-right: 26px solid transparent;
    border-top: 46px solid #c46a3f; z-index: 3;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,.5));
  }
</style>
</head>
<body>
  <svg class="mountains" viewBox="0 0 1200 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 130 L180 30 L320 110 L470 10 L640 120 L780 40 L940 135 L1080 55 L1200 140 L1200 220 L0 220 Z" fill="#cfe0d3"/>
    <path d="M0 180 L160 110 L300 170 L460 95 L620 180 L800 120 L980 185 L1120 125 L1200 180 L1200 220 L0 220 Z" fill="#b3cdb9"/>
  </svg>

  <div class="content">
    <div class="eyebrow">Cantabria con peques</div>
    <h1>Ruleta de <span class="accent">rutas</span> de senderismo</h1>
    <div class="sub">74 senderos fáciles y aptos para ir con peques. ¡Gira y a caminar!</div>
    <div class="badges">
      <span class="badge">🥾 74 rutas</span>
      <span class="badge">🚗 Cómo llegar</span>
      <span class="badge">📍 Wikiloc</span>
    </div>
  </div>

  <div class="wheel-area">
    <div class="pointer"></div>
    <div class="wheel"><div class="hub">🥾</div></div>
  </div>

  <div class="url">llinxfood.github.io/ruleta-rutas-cantabria-peques</div>
</body>
</html>
